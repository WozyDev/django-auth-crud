{% extends 'base.html' %}

{% block content %}

<main class="container py-5">
    <div class="row">
        <section class="col-md-4 offset-md-4">

            <div class="card card-body">

                <form method="POST">

                    <h1 class="text-secondary text-center">{{ task.title }}</h1>

                    {{ error }}
                    {% csrf_token %}
                    {{ form }}

                    <button class="btn btn-dark">Update</button>

                </form>

                <form action="{% url 'task_complete' task.id %}" method="POST" class="mt-1">

                    {% csrf_token %}

                    <button class="btn btn-dark">Complete</button>

                </form>

                <form action="{% url 'task_delete' task.id %}" method="POST" class="mt-1">

                    {% csrf_token %}

                    <button class="btn btn-danger">Delete</button>

                </form>

            </div>

        </section>
    </div>
</main>

{% endblock %}
